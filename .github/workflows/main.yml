name: 'publish'

on:
  workflow_dispatch:
  push:
    branches:
      - release

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest' # for Arm based macs (M1 and above).
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest' # for Intel based macs.
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'ubuntu-22.04-arm' # Only available in public repos.
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04' || matrix.platform == 'ubuntu-22.04-arm' # This must match the platform value defined above.
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable # Set this to dtolnay/rust-toolchain@nightly
        with:
          # Those targets are only used on macos runners so it's in an `if` to slightly speed up windows and linux builds.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: install frontend dependencies
        # If you don't have `beforeBuildCommand` configured you may want to build your frontend here too.
        run: npm ci

      - name: bump version and create tag
        # Bumps patch version across all version files and creates a release tag.
        shell: bash
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Read current version from package.json
          OLD_VERSION=$(node -p "require('./package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$OLD_VERSION"
          NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
          echo "Bumping version from $OLD_VERSION to $NEW_VERSION"
          
          # Update package.json
          node -e "const pkg=require('./package.json'); pkg.version='$NEW_VERSION'; require('fs').writeFileSync('./package.json', JSON.stringify(pkg, null, 2) + '\n')"
          
          # Update src-tauri/Cargo.toml and tauri.conf.json (portable sed for macOS/Linux)
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            sed -i '' "s/^version = \"$OLD_VERSION\"/version = \"$NEW_VERSION\"/" src-tauri/Cargo.toml
            sed -i '' "s/\"version\": \"$OLD_VERSION\"/\"version\": \"$NEW_VERSION\"/" src-tauri/tauri.conf.json
          else
            sed -i "s/^version = \"$OLD_VERSION\"/version = \"$NEW_VERSION\"/" src-tauri/Cargo.toml
            sed -i "s/\"version\": \"$OLD_VERSION\"/\"version\": \"$NEW_VERSION\"/" src-tauri/tauri.conf.json
          fi
          
          # Commit and tag
          git add package.json src-tauri/Cargo.toml src-tauri/tauri.conf.json
          git commit -m "chore: bump version to $NEW_VERSION"
          git pull --rebase origin release
          git push origin HEAD:release
          
          TAG="app-v${NEW_VERSION}"
          git fetch --tags origin
          if git rev-parse --verify "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists. Skipping."
          else
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
          fi
          echo "Released version $NEW_VERSION with tag $TAG"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v__VERSION__ # the action automatically replaces __VERSION__ with the app version.
          releaseName: 'Theater Soundboard v__VERSION__'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: install frontend dependencies
        run: npm ci

      - name: initialize Tauri iOS project
        run: npm run tauri -- ios init

      - name: build iOS artifact (unsigned for sideload)
        shell: bash
        run: |
          set -euo pipefail

          # Locate the Xcode project scaffolded by tauri ios init
          XCODEPROJ=$(find src-tauri/gen/apple -maxdepth 2 -name '*.xcodeproj' | head -n 1)
          if [[ -z "$XCODEPROJ" ]]; then
            echo "No Xcode project found in src-tauri/gen/apple" >&2
            exit 1
          fi

          # Discover the actual scheme name from the project rather than assuming
          # it matches the filename — Tauri-generated projects may differ.
          echo "Available schemes in $XCODEPROJ:"
          xcodebuild -list -project "$XCODEPROJ" 2>&1 || true
          SCHEME=$(xcodebuild -list -project "$XCODEPROJ" 2>/dev/null \
            | awk '/Schemes:/,0' \
            | grep -v 'Schemes:' \
            | grep -v '^$' \
            | head -n 1 \
            | xargs)
          if [[ -z "$SCHEME" ]]; then
            echo "Could not determine scheme from $XCODEPROJ" >&2
            exit 1
          fi
          echo "Using scheme: $SCHEME"
          BUILD_DIR="$(pwd)/artifacts/ios/build"
          mkdir -p "$BUILD_DIR"

          # Build without code signing — Sideloadly re-signs at install time
          xcodebuild \
            -project "$XCODEPROJ" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            CONFIGURATION_BUILD_DIR="$BUILD_DIR" \
            build

      - name: package IPA for sideload
        shell: bash
        run: |
          set -euo pipefail

          APP_PATH=$(find artifacts/ios/build -maxdepth 1 -name '*.app' | head -n 1 || true)
          if [[ -z "$APP_PATH" ]]; then
            echo "No .app bundle found after xcodebuild" >&2
            exit 1
          fi

          mkdir -p artifacts/ios/Payload
          cp -R "$APP_PATH" artifacts/ios/Payload/
          (cd artifacts/ios && /usr/bin/zip -qry sideload.ipa Payload)
          rm -rf artifacts/ios/Payload artifacts/ios/build

      - name: upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: artifacts/ios/sideload.ipa